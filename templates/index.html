<!DOCTYPE html>
<html>
<head>
<title>Freelancing Mentor AI</title>

<style>
body {
    background: #343541;
    color: white;
    font-family: Arial;
}

#chat {
    height: 80vh;
    overflow-y: auto;
    padding: 10px;
}

.user {
    text-align: right;
    margin: 10px;
}

.bot {
    text-align: left;
    margin: 10px;
}

input {
    width: 80%;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #10a37f;
    color: white;
}
</style>

</head>

<body>

<h2>Freelancing Mentor AI</h2>

<div id="chat"></div>

<input id="message" placeholder="Type message...">
<button onclick="send()">Send</button>

<script>

async function send(){

    let input = document.getElementById("message");
    let message = input.value;

    if(!message) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="user">You: ${message}</div>`;

    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    let data = await res.json();

    chat.innerHTML += `<div class="bot">AI: ${data.reply}</div>`;

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
